name: vulnerable-workflow

on:
  pull_request_target:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Run attacker-controlled script
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          chmod +x ./script.sh && ./script.sh